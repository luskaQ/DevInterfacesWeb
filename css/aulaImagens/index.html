<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Trabalhando com Imagens</title>
    <style>
        img{
            width: 500px;
        }
    </style>
</head>

<body>
    <h1>Trabalho com imagens</h1>
    <h2>Imagem bitmap</h2>
    <img src="imagens/logo-sem-fundo.png" alt="imagem do logo sem fundo em formato png">
    <h2>Imagem vetorial</h2>
    <img src="imagens/logo-sem-fundo.svg" alt="imagem do logo sem fundo em formato png">
    <h2>Gif</h2>
    <img src="imagens/gif-animado.gif" alt="imagem com gif animado de personagem do simpsons correndo"

</body>

</html>
