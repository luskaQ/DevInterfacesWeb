<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box shadow</title>
    <style>
        div{
            background-color: orange;
            width: 200px;
            height: 200px;
            margin: 100px auto;
            box-shadow: -10px -10px 10px black, 10px 10px 10px red;
        }
    </style>
</head>
<body>
    <div></div>
    
</body>
</html>
