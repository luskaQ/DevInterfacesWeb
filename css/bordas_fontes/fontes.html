<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes</title>
    <style>
        @font-face {
            font-family: nadia;
            src: url(fonts/nadia/nadia-serif.ttf);
        }

        @font-face {
            font-family: astrobi;
            src: url(fonts/astronbi.ttf);
        }

        @import url('https://fonts.googleapis.com/css2?family=Tektur:wght@400..900&display=swap');

        h1 {
            font-family: nadia, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        p {
            font-family: astrobi;
        }
    </style>
</head>

<body>
    <h1>Font-face</h1>

    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Eius eum corrupti iusto iste fuga consectetur
        reiciendis, sapiente nihil rem esse, in voluptatem! Ad blanditiis sint similique rerum, cumque asperiores quos?
    </p>
</body>

</html>
