<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Flexbox</title>

    <style>
        .flexbox {
            height: 300px;
            border: 5px solid blue;
            margin-bottom: 20px;
            display: flex;
        }

        .flexbox div {
            border: 3px solid green;
            width: 350px;
            margin: 10px;
        }

        .flex-container1 {
            flex-wrap: wrap;
            flex-direction: row;
        }

        .flex-container2 div {
            width: 30px;
            margin: 0;
        }

        .flex-container2 {
            flex-direction: row;
            justify-content: space-around;
        }

        .flex-container3 div {
            width: 30px;
            margin: 0;
        }

        .flex-container3 {
            flex-direction: row;
            justify-content: space-around;
            align-items: start;
        }

        .flex-container4 div {
            width: 150px;
            margin: 0;
        }

        .flex-container4{
            flex-direction: column;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end;
            align-content: flex-start;
        }
    </style>

</head>

<body>
    <div class="flexbox flex-container1">
        <div class="div1">Div 1</div>
        <div class="div2">Div 2</div>
        <div class="div3">Div 3</div>
        <div class="div4">Div 4</div>
    </div>
    <div class="flexbox flex-container2">
        <div class="div1">Div 1</div>
        <div class="div2">Div 2</div>
        <div class="div3">Div 3</div>
    </div>
    <div class="flexbox flex-container3">
        <div class="div1">Div 1</div>
        <div class="div2">Div 2</div>
        <div class="div3">Div 3</div>
    </div>
    
    <div class="flexbox flex-container4">
        <div class="div1">Div 1</div>
        <div class="div2">Div 2</div>
        <div class="div3">Div 3</div>
    </div>
</body>

</html>
