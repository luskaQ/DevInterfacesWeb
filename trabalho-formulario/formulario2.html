    <title>Formulario2</title>
    <link rel="stylesheet" href="formulario2.css">
</head>

<body>
    <form action="#">
        <img class="img-circulo" src="imgs2/image-removebg-preview(4).png" alt="">

        <fieldset>

        <p>Don't have an account? <a href="#">Register</a></p>
